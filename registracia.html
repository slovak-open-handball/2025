<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registračný Formulár</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
        }
        .container {
            max-width: 800px;
        }
        .form-group label {
            font-weight: 600;
            color: #333;
        }
        .form-input {
            border-radius: 0.5rem;
            border: 1px solid #d1d5db;
            padding: 0.75rem 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }
        .btn-primary {
            background-color: #1a73e8;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #1558b0;
        }
        .message {
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 0.5rem;
            font-weight: 500;
            text-align: center;
        }
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }
        .message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border-color: #bee5eb;
        }
        .message.hidden {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="container bg-white p-8 rounded-lg shadow-lg w-full">
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">Registrácia klubu na turnaj</h2>

        <form id="registrationForm" class="space-y-6">
            <!-- Základné informácie o klube -->
            <div class="form-group">
                <label for="officialClubName" class="block text-gray-700 text-sm mb-2">Oficiálny názov klubu:</label>
                <input type="text" id="officialClubName" name="officialClubName" class="form-input" required>
            </div>

            <!-- Fakturačné údaje -->
            <div class="border-t border-gray-200 pt-6 mt-6">
                <h3 class="text-xl font-semibold text-gray-700 mb-4">Fakturačné údaje</h3>
                <div class="form-group">
                    <label for="billingName" class="block text-gray-700 text-sm mb-2">Fakturačný názov (ak sa líši od názvu klubu):</label>
                    <input type="text" id="billingName" name="billingName" class="form-input">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="form-group">
                        <label for="ico" class="block text-gray-700 text-sm mb-2">IČO:</label>
                        <!-- IČO: len čísla, 8 číslic -->
                        <input type="text" id="ico" name="ico" class="form-input"
                               pattern="[0-9]{8}" maxlength="8" inputmode="numeric"
                               title="Prosím zadajte presne 8 číslic pre IČO." required>
                    </div>
                    <div class="form-group">
                        <label for="dic" class="block text-gray-700 text-sm mb-2">DIČ:</label>
                        <!-- DIČ: len čísla, 10 číslic -->
                        <input type="text" id="dic" name="dic" class="form-input"
                               pattern="[0-9]{10}" maxlength="10" inputmode="numeric"
                               title="Prosím zadajte presne 10 číslic pre DIČ." required>
                    </div>
                    <div class="form-group">
                        <label for="icDph" class="block text-gray-700 text-sm mb-2">IČ DPH:</label>
                        <!-- IČ DPH: 2 písmená a 10 číslic -->
                        <input type="text" id="icDph" name="icDph" class="form-input"
                               pattern="[A-Za-z]{2}[0-9]{10}" maxlength="12"
                               title="Prosím zadajte 2 písmená a 10 číslic pre IČ DPH (napr. SK1234567890)." required>
                    </div>
                </div>

                <!-- Adresa -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
                    <div class="form-group">
                        <label for="street" class="block text-gray-700 text-sm mb-2">Ulica:</label>
                        <input type="text" id="street" name="street" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="houseNumber" class="block text-gray-700 text-sm mb-2">Číslo domu:</label>
                        <input type="text" id="houseNumber" name="houseNumber" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="city" class="block text-gray-700 text-sm mb-2">Mesto:</label>
                        <input type="text" id="city" name="city" class="form-input" required>
                    </div>
                    <div class="form-group md:col-span-1">
                        <label for="zipCode" class="block text-gray-700 text-sm mb-2">PSČ:</label>
                        <!-- PSČ: 3 číslice, medzera, 2 číslice -->
                        <input type="text" id="zipCode" name="zipCode" class="form-input"
                               pattern="[0-9]{3}[ ][0-9]{2}" maxlength="6" inputmode="numeric"
                               title="Prosím zadajte 5 číslic pre PSČ vo formáte 'XXX XX' (napr. 811 01)." required>
                    </div>
                </div>
            </div>

            <!-- Kontaktná osoba -->
            <div class="border-t border-gray-200 pt-6 mt-6">
                <h3 class="text-xl font-semibold text-gray-700 mb-4">Kontaktná osoba</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="form-group">
                        <label for="contactPersonFirstName" class="block text-gray-700 text-sm mb-2">Meno:</label>
                        <input type="text" id="contactPersonFirstName" name="contactPersonFirstName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="contactPersonLastName" class="block text-gray-700 text-sm mb-2">Priezvisko:</label>
                        <input type="text" id="contactPersonLastName" name="contactPersonLastName" class="form-input" required>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                    <div class="form-group">
                        <label for="contactPersonPhone" class="block text-gray-700 text-sm mb-2">Telefón:</label>
                        <!-- Zmenené pre telefónne číslo: +421 9xxx xxx xxx -->
                        <input type="tel" id="contactPersonPhone" name="contactPersonPhone" class="form-input"
                               pattern="^\+421 9[0-9]{3} [0-9]{3} [0-9]{3}$" maxlength="17" inputmode="tel"
                               title="Prosím zadajte telefónne číslo vo formáte +421 9xxx xxx xxx." required>
                    </div>
                    <div class="form-group">
                        <label for="contactPersonEmail" class="block text-gray-700 text-sm mb-2">E-mail:</label>
                        <input type="email" id="contactPersonEmail" name="contactPersonEmail" class="form-input" required>
                    </div>
                </div>
            </div>

            <!-- Správa -->
            <div class="form-group border-t border-gray-200 pt-6 mt-6">
                <label for="sprava" class="block text-gray-700 text-sm mb-2">Správa (nepovinné):</label>
                <textarea id="sprava" name="sprava" class="form-input form-textarea"></textarea>
            </div>

            <button type="submit" id="submitButton" class="btn-primary w-full">Odoslať registráciu</button>
            <div id="message" class="message hidden"></div>
        </form>
    </div>

    <script src="registracia.js"></script>
</body>
</html>
