<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrácia klubu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="registracia.css">

    <!-- Firebase SDK Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Firebase konfigurácia a inicializácia
        // Tieto premenné sú poskytované prostredím Canvas
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let app;
        let db;
        let auth;
        let userId = null; // Bude nastavené po autentifikácii

        if (firebaseConfig) {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);

            // Autentifikácia používateľa
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    userId = user.uid;
                    console.log("Firebase User ID:", userId);
                    const userIdDisplay = document.getElementById('userIdDisplay');
                } else {
                    // Ak nie je prihlásený, pokúste sa prihlásiť pomocou tokenu alebo anonymne
                    try {
                        if (initialAuthToken) {
                            await signInWithCustomToken(auth, initialAuthToken);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Chyba pri Firebase autentifikácii:", error);
                        const userIdDisplay = document.getElementById('userIdDisplay');
                        if (userIdDisplay) {
                            userIdDisplay.textContent = `Chyba pri prihlásení: ${error.message}`;
                        }
                    }
                }
            });
        } else {
            console.error("Firebase konfigurácia nie je k dispozícii.");
            const userIdDisplay = document.getElementById('userIdDisplay');
            if (userIdDisplay) {
                userIdDisplay.textContent = "Firebase nie je inicializované (chýba konfigurácia).";
            }
        }

        // Sprístupnenie Firebase inštancií globálne pre registracia.js
        window.firebaseApp = app;
        window.firebaseDb = db;
        window.firebaseAuth = auth;
        window.getFirebaseUserId = () => userId; // Funkcia na získanie userId
        window.getFirebaseAppId = () => appId; // Funkcia na získanie appId
        window.getAddDoc = () => addDoc; // Funkcia na získanie addDoc
        window.getCollection = () => collection; // Funkcia na získanie collection

    </script>
</head>
<body>
    <div class="container mx-auto p-6 bg-white shadow-lg rounded-lg my-10 max-w-3xl">
        <h1 class="text-3xl font-extrabold text-center text-gray-900 mb-8">Registrácia klubu</h1>

        <!-- Zobrazenie ID používateľa -->
        <p id="userIdDisplay" class="text-sm text-gray-500 text-center mb-4"></p>

        <form id="registrationForm" class="space-y-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Základné informácie o klube</h2>
            <div class="mb-4">
                <label for="officialClubName" class="block text-gray-700 text-sm font-bold mb-2">Oficiálny názov klubu:</label>
                <input type="text" id="officialClubName" name="officialClubName" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
            </div>
            <div class="mb-4">
                <label for="billingName" class="block text-gray-700 text-sm font-bold mb-2">Fakturačný názov (ak sa líši od oficiálneho):</label>
                <input type="text" id="billingName" name="billingName" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md">
            </div>

            <h2 class="text-xl font-semibold mb-4 text-gray-800">Identifikačné údaje</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="mb-4 md:mb-0">
                    <label for="icoInput" class="block text-gray-700 text-sm font-bold mb-2">IČO:</label>
                    <input type="text" id="icoInput" name="company.ico" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" placeholder="Napr. 12345678" maxlength="8">
                </div>
                <div class="mb-4 md:mb-0">
                    <label for="dicInput" class="block text-gray-700 text-sm font-bold mb-2">DIČ:</label>
                    <input type="text" id="dicInput" name="company.dic" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" placeholder="Napr. 1234567890" maxlength="10">
                </div>
                <div>
                    <label for="icDPHInput" class="block text-gray-700 text-sm font-bold mb-2">IČ DPH:</label>
                    <input type="text" id="icDPHInput" name="company.icDPH" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" placeholder="Napr. SK1234567890" maxlength="12">
                </div>
            </div>
            <p class="text-sm text-gray-500 mt-2">Vyplňte prosím aspoň jedno z polí IČO, DIČ alebo IČ DPH.</p>

            <h2 class="text-xl font-semibold mb-4 text-gray-800">Adresa</h2>
            <div class="mb-4">
                <label for="street" class="block text-gray-700 text-sm font-bold mb-2">Ulica:</label>
                <input type="text" id="street" name="address.street" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="mb-4 md:mb-0">
                    <label for="houseNumberInput" class="block text-gray-700 text-sm font-bold mb-2">Číslo domu:</label>
                    <input type="text" id="houseNumberInput" name="address.houseNumber" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
                </div>
                <div class="mb-4 md:mb-0">
                    <label for="city" class="block text-gray-700 text-sm font-bold mb-2">Mesto:</label>
                    <input type="text" id="city" name="address.city" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
                </div>
                <div>
                    <label for="pscInput" class="block text-gray-700 text-sm font-bold mb-2">PSČ:</label>
                    <input type="text" id="pscInput" name="address.psc" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" placeholder="Napr. 900 12" maxlength="6" required>
                </div>
            </div>
            <div class="mb-4">
                <label for="state" class="block text-gray-700 text-sm font-bold mb-2">Štát:</label>
                <input type="text" id="state" name="address.state" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" value="Slovenská republika" required>
            </div>

            <h2 class="text-xl font-semibold mb-4 text-gray-800">Kontaktná osoba</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="mb-4 md:mb-0">
                    <label for="contactPersonName" class="block text-gray-700 text-sm font-bold mb-2">Meno:</label>
                    <input type="text" id="contactPersonName" name="contactPerson.name" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
                </div>
                <div>
                    <label for="contactPersonSurname" class="block text-gray-700 text-sm font-bold mb-2">Priezvisko:</label>
                    <input type="text" id="contactPersonSurname" name="contactPerson.surname" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="mb-4 md:mb-0">
                    <label for="phonePrefix" class="block text-gray-700 text-sm font-bold mb-2">Predvoľba:</label>
                    <select id="phonePrefix" name="contactPerson.phonePrefix" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div>
                    <label for="phoneNumberInput" class="block text-gray-700 text-sm font-bold mb-2">Telefónne číslo bez predvoľby:</label>
                    <input type="tel" id="phoneNumberInput" name="contactPerson.phone" inputmode="tel" pattern="[0-9]{3} [0-9]{3} [0-9]{3}" maxlength="11" placeholder="Telefónne číslo (napr. 900 123 456)" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            
            <div class="mb-4">
                <label for="contactPersonEmail" class="block text-gray-700 text-sm font-bold mb-2">E-mail:</label>
                <input type="email" id="emailInput" name="contactPerson.email" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="mb-6">
                <label for="message" class="block text-gray-700 text-sm font-bold mb-2">Správa (voliteľné):</label>
                <textarea id="message" name="message" rows="4" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md"></textarea>
            </div>

            <div class="flex items-center justify-between">
                <button type="submit" class="btn-primary w-full text-center font-bold focus:outline-none focus:shadow-outline rounded-md bg-blue-500 hover:bg-blue-700 text-white py-2 px-4">
                    Odoslať registráciu
                </button>
            </div>
            <div id="statusMessage" class="mt-4 text-center"></div>
        </form>
    </div>

    <script src="registracia.js"></script>
</body>
</html>
