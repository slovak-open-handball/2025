<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrácia klubu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="registracia.css">
</head>
<body>
    <div class="container mx-auto p-6 bg-white shadow-lg rounded-lg my-10 max-w-3xl">
        <h1 class="text-3xl font-extrabold text-center text-gray-900 mb-8">Registrácia klubu</h1>

        <form id="registrationForm" class="space-y-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Základné informácie o klube</h2>
            <div class="mb-4">
                <label for="officialClubName" class="block text-gray-700 text-sm font-bold mb-2">Oficiálny názov klubu:</label>
                <input type="text" id="officialClubName" name="officialClubName" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div class="mb-4">
                <label for="billingName" class="block text-gray-700 text-sm font-bold mb-2">Fakturačný názov (ak sa líši od oficiálneho):</label>
                <input type="text" id="billingName" name="billingName" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <h2 class="text-xl font-semibold mb-4 text-gray-800">Identifikačné údaje</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="mb-4 md:mb-0">
                    <label for="icoInput" class="block text-gray-700 text-sm font-bold mb-2">IČO:</label>
                    <input type="text" id="icoInput" name="company.ico" inputmode="numeric" pattern="[0-9]{8}" maxlength="8" placeholder="12345678" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mb-4 md:mb-0">
                    <label for="dicInput" class="block text-gray-700 text-sm font-bold mb-2">DIČ:</label>
                    <input type="text" id="dicInput" name="company.dic" inputmode="numeric" pattern="[0-9]{10}" maxlength="10" placeholder="1234567890" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="icDPHInput" class="block text-gray-700 text-sm font-bold mb-2">IČ DPH (ak ste platca):</label>
                    <input type="text" id="icDPHInput" name="company.icDPH" pattern="[A-Z]{2}[0-9]{10}" maxlength="12" placeholder="SK1234567890" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <h2 class="text-xl font-semibold mb-4 text-gray-800">Adresa</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="mb-4 md:mb-0">
                    <label for="street" class="block text-gray-700 text-sm font-bold mb-2">Ulica:</label>
                    <input type="text" id="street" name="address.street" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label for="houseNumberInput" class="block text-gray-700 text-sm font-bold mb-2">Číslo domu:</label>
                    <input type="text" id="houseNumberInput" name="address.houseNumber" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="mb-4 md:mb-0">
                    <label for="city" class="block text-gray-700 text-sm font-bold mb-2">Mesto:</label>
                    <input type="text" id="city" name="address.city" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label for="pscInput" class="block text-gray-700 text-sm font-bold mb-2">PSČ:</label>
                    <input type="text" id="pscInput" name="address.psc" inputmode="numeric" pattern="[0-9]{3} [0-9]{2}" maxlength="6" placeholder="900 12" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
            </div>
            <div class="mb-4">
                <label for="state" class="block text-gray-700 text-sm font-bold mb-2">Štát:</label>
                <input type="text" id="state" name="address.state" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>

            <h2 class="text-xl font-semibold mb-4 text-gray-800">Kontaktná osoba</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="mb-4 md:mb-0">
                    <label for="contactPersonName" class="block text-gray-700 text-sm font-bold mb-2">Meno:</label>
                    <input type="text" id="contactPersonName" name="contactPerson.name" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label for="contactPersonSurname" class="block text-gray-700 text-sm font-bold mb-2">Priezvisko:</label>
                    <input type="text" id="contactPersonSurname" name="contactPerson.surname" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
                <div class="mb-4 md:mb-0">
                    <label for="phonePrefix" class="block text-gray-700 text-sm font-bold mb-2">Predvoľba:</label>
                    <select id="phonePrefix" name="contactPerson.phonePrefix" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </select>
                </div>
                <div>
                    <label for="phoneNumberInput" class="block text-gray-700 text-sm font-bold mb-2">Telefónne číslo bez predvoľby:</label>
                    <input type="tel" id="phoneNumberInput" name="contactPerson.phone" inputmode="tel" pattern="[0-9]{3} [0-9]{3} [0-9]{3}" maxlength="11" placeholder="napr. 900 123 456" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="mb-4">
                <label for="emailInput" class="block text-gray-700 text-sm font-bold mb-2">E-mail:</label>
                <input type="email" id="emailInput" name="contactPerson.email" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="mb-6">
                <label for="message" class="block text-gray-700 text-sm font-bold mb-2">Správa (voliteľné):</label>
                <textarea id="message" name="message" rows="4" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <div class="flex items-center justify-between">
                <button type="submit" class="btn-primary w-full text-center font-bold focus:outline-none focus:shadow-outline rounded-md bg-blue-500 hover:bg-blue-700 text-white py-2 px-4 transition duration-300 ease-in-out">
                    Odoslať registráciu
                </button>
            </div>
            <div id="statusMessage" class="mt-4 text-center"></div>
        </form>
    </div>

    <script src="registracia.js"></script>
</body>
</html>
