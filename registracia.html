<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrácia na Turnaj</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome pre ikony -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 700px;
        }
        h1 {
            color: #1a202c;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        textarea:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.5);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button:hover {
            background-color: #3182ce;
            transform: translateY(-2px);
        }
        button:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }
        .message.hidden {
            opacity: 0;
            height: 0;
            padding: 0;
            overflow: hidden;
        }
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .form-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background-color: #f7fafc;
        }
        .form-section-title {
            font-size: 22px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Registrácia klubu na turnaj</h1>
        <form id="registrationForm" class="space-y-6">

            <!-- Oficiálny názov klubu -->
            <div class="form-section">
                <h2 class="form-section-title">Informácie o klube</h2>
                <div>
                    <label for="officialClubName">Oficiálny názov klubu:</label>
                    <input type="text" id="officialClubName" name="officialClubName" required>
                </div>
            </div>

            <!-- Fakturačné údaje -->
            <div class="form-section">
                <h2 class="form-section-title">Fakturačné údaje</h2>
                <div>
                    <label for="billingName">Názov klubu/organizácie (fakturačné):</label>
                    <input type="text" id="billingName" name="billingName" required>
                </div>
                <div>
                    <label for="ico">IČO:</label>
                    <input type="text" id="ico" name="ico" required>
                </div>
                <div>
                    <label for="dic">DIČ:</label>
                    <input type="text" id="dic" name="dic">
                </div>
                <div>
                    <label for="icDph">IČ DPH:</label>
                    <input type="text" id="icDph" name="icDph">
                </div>
                <div>
                    <label for="billingAddress">Adresa sídla (ulica, číslo, mesto, PSČ):</label>
                    <input type="text" id="billingAddress" name="billingAddress" required>
                </div>
            </div>

            <!-- Kontaktná osoba -->
            <div class="form-section">
                <h2 class="form-section-title">Kontaktná osoba</h2>
                <div>
                    <label for="contactPersonFirstName">Meno kontaktnej osoby:</label>
                    <input type="text" id="contactPersonFirstName" name="contactPersonFirstName" required>
                </div>
                <div>
                    <label for="contactPersonLastName">Priezvisko kontaktnej osoby:</label>
                    <input type="text" id="contactPersonLastName" name="contactPersonLastName" required>
                </div>
                <div>
                    <label for="contactPersonPhone">Telefónne číslo kontaktnej osoby:</label>
                    <input type="tel" id="contactPersonPhone" name="contactPersonPhone" required>
                </div>
                <div>
                    <label for="contactPersonEmail">E-mailová adresa kontaktnej osoby:</label>
                    <input type="email" id="contactPersonEmail" name="contactPersonEmail" required>
                </div>
            </div>

            <!-- Správa (voliteľná) -->
            <div class="form-section">
                <h2 class="form-section-title">Doplňujúce informácie (voliteľné)</h2>
                <div>
                    <label for="sprava">Vaša správa:</label>
                    <textarea id="sprava" name="sprava" rows="4"></textarea>
                </div>
            </div>

            <button type="submit" id="submitButton">
                <i class="fas fa-paper-plane mr-2"></i> Odoslať registráciu
            </button>
        </form>
        <div id="message" class="message hidden"></div>
    </div>
    <script type="module" src="registracia.js"></script>
</body>
</html>
