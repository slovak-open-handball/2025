<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrácia tímu na turnaj</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- Font Awesome pre ikony -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="registracia.css">
</head>
<body>
    <div class="container">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">Registrácia tímu na turnaj</h1>
        <!-- Favicon.ico pridaný sem -->
        <img src="favicon.ico" alt="Logo turnaja" style="display: block; margin: 0 auto 2rem auto; width: 64px; height: 64px;">
        <form id="registrationForm">
            <div class="form-group">
                <label for="officialClubName">Oficiálny názov klubu:</label>
                <input type="text" id="officialClubName" name="officialClubName" placeholder="Zadajte oficiálny názov klubu" required>
            </div>
            <div class="form-group">
                <label for="organizationName">Názov organizácie (v prípade, že je iný, ako názov klubu):</label>
                <input type="text" id="organizationName" name="organizationName" placeholder="Zadajte názov organizácie (nepovinné)">
            </div>

            <!-- NOVÝ NADPIS "Fakturačné údaje" -->
            <h2 style="font-size: 1.5rem; font-weight: 600; color: #374151; margin-top: 2rem; margin-bottom: 1rem;">Fakturačné údaje</h2>

            <!-- NOVÁ SEKCIA PRE IČO, DIČ, IČ DPH -->
            <div class="form-group-triple">
                <div class="form-group">
                    <label for="ico">IČO:</label>
                    <input type="text" id="ico" name="ico" placeholder="Presne 8 číslic" pattern="^\d{8}$" title="IČO musí obsahovať presne 8 číslic.">
                </div>
                <div class="form-group">
                    <label for="dic">DIČ:</label>
                    <input type="text" id="dic" name="dic" placeholder="Presne 10 číslic" pattern="^\d{10}$" title="DIČ musí obsahovať presne 10 číslic.">
                </div>
                <div class="form-group">
                    <label for="icDPH">IČ DPH:</label>
                    <input type="text" id="icDPH" name="icDPH" placeholder="2 veľké písmená a 10 číslic" pattern="^[A-Z]{2}\d{10}$" title="IČ DPH musí začínať 2 veľkými písmenami a nasledovať musí 10 číslic.">
                </div>
            </div>
            <!-- KONIEC NOVEJ SEKCE -->

            <div class="form-group">
                <label for="meno">Meno kontaktnej osoby:</label>
                <input type="text" id="meno" name="meno" placeholder="zadajte vaše meno alebo názov tímu" required>
            </div>
            <div class="form-group">
                <label for="email">E-mailová adresa:</label>
                <input type="email" id="email" name="email" placeholder="zadajte váš e-mail" required>
            </div>
            <div class="form-group">
                <label for="teamInfo">Informácie o tíme (názov tímu, kategória, atď.):</label>
                <textarea id="teamInfo" name="sprava" rows="4" placeholder="zadajte názov tímu, kategóriu, mená hráčov, atď." required></textarea>
            </div>

            <button type="submit" id="submitButton">
                <i class="fas fa-paper-plane mr-2"></i> Odoslať registráciu
            </button>
        </form>
        <div id="message" class="message hidden"></div>
        <div id="userIdDisplay" class="user-id-display hidden"></div>
    </div>

    <!-- Link na JavaScript súbor -->
    <script type="module" src="registracia.js"></script>
</body>
</html>
