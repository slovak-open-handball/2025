<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrácia klubu</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom styles -->
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Light gray background */
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Align items to the top */
            min-height: 100vh;
            padding: 2rem 1rem; /* Add some padding for mobile */
        }
        .container {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 0.75rem; /* Rounded corners */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); /* Soft shadow */
            max-width: 800px; /* Max width for larger screens */
            width: 100%;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea,
        select {
            border-color: #d1d5db; /* Light border color */
        }
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #6366f1; /* Indigo focus border */
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); /* Indigo focus ring */
        }
        .btn-primary {
            background-color: #6366f1; /* Indigo background */
            color: #ffffff;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            transition: background-color 0.2s ease-in-out;
        }
        .btn-primary:hover {
            background-color: #4f46e5; /* Darker indigo on hover */
        }
        .error-message {
            color: #ef4444; /* Red for error messages */
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        .success-message {
            color: #22c55e; /* Green for success messages */
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-3xl font-extrabold text-center text-gray-900 mb-8">Registrácia klubu</h1>

        <form id="registrationForm" class="space-y-6">
            <!-- Základné informácie o klube -->
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Základné informácie o klube</h2>
            <div class="mb-4">
                <label for="officialClubName" class="block text-gray-700 text-sm font-bold mb-2">Oficiálny názov klubu:</label>
                <input type="text" id="officialClubName" name="officialClubName" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
            </div>
            <div class="mb-4">
                <label for="billingName" class="block text-gray-700 text-sm font-bold mb-2">Fakturačný názov (ak sa líši od oficiálneho):</label>
                <input type="text" id="billingName" name="billingName" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md">
            </div>

            <!-- Identifikačné údaje -->
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Identifikačné údaje</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="mb-4 md:mb-0">
                    <label for="ico" class="block text-gray-700 text-sm font-bold mb-2">IČO:</label>
                    <input type="text" id="ico" name="ico" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
                </div>
                <div class="mb-4 md:mb-0">
                    <label for="dic" class="block text-gray-700 text-sm font-bold mb-2">DIČ:</label>
                    <input type="text" id="dic" name="dic" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
                </div>
                <div class="mb-4 md:mb-0">
                    <label for="icDph" class="block text-gray-700 text-sm font-bold mb-2">IČ DPH (ak ste platca):</label>
                    <input type="text" id="icDph" name="icDph" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md">
                </div>
            </div>

            <!-- Adresa -->
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Adresa</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="mb-4 md:mb-0">
                    <label for="street" class="block text-gray-700 text-sm font-bold mb-2">Ulica:</label>
                    <input type="text" id="street" name="address.street" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
                </div>
                <div class="mb-4 md:mb-0">
                    <label for="houseNumber" class="block text-gray-700 text-sm font-bold mb-2">Číslo domu:</label>
                    <input type="text" id="houseNumber" name="address.houseNumber" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="mb-4 md:mb-0">
                    <label for="city" class="block text-gray-700 text-sm font-bold mb-2">Mesto:</label>
                    <input type="text" id="city" name="address.city" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
                </div>
                <div class="mb-4 md:mb-0">
                    <label for="zipCode" class="block text-gray-700 text-sm font-bold mb-2">PSČ:</label>
                    <input type="text" id="zipCode" name="address.zipCode" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
                </div>
            </div>

            <!-- Kontaktná osoba -->
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Kontaktná osoba</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="mb-4 md:mb-0">
                    <label for="contactPersonFirstName" class="block text-gray-700 text-sm font-bold mb-2">Meno:</label>
                    <input type="text" id="contactPersonFirstName" name="contactPerson.firstName" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
                </div>
                <div class="mb-4 md:mb-0">
                    <label for="contactPersonLastName" class="block text-gray-700 text-sm font-bold mb-2">Priezvisko:</label>
                    <input type="text" id="contactPersonLastName" name="contactPerson.lastName" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
                </div>
            </div>

            <!-- Telefónne číslo (predvoľba a číslo vedľa seba) -->
            <div class="mb-4">
                <label for="contactPersonPhone" class="block text-gray-700 text-sm font-bold mb-2">Telefón:</label>
                <div class="flex">
                    <select id="phonePrefix" name="contactPerson.phonePrefix" class="shadow appearance-none border rounded-l py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-l-md w-1/4 max-w-[100px]">
                        <!-- Možnosti predvolieb budú pridané JS -->
                    </select>
                    <input type="tel" id="contactPersonPhone" name="contactPerson.phone" class="shadow appearance-none border rounded-r w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-r-md" required>
                </div>
            </div>

            <!-- E-mail (na samostatnom riadku) -->
            <div class="mb-4">
                <label for="contactPersonEmail" class="block text-gray-700 text-sm font-bold mb-2">E-mail:</label>
                <input type="email" id="contactPersonEmail" name="contactPerson.email" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md" required>
            </div>

            <!-- Správa -->
            <div class="mb-6">
                <label for="message" class="block text-gray-700 text-sm font-bold mb-2">Správa (voliteľné):</label>
                <textarea id="message" name="message" rows="4" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline rounded-md"></textarea>
            </div>

            <!-- Tlačidlo odoslať -->
            <div class="flex items-center justify-between">
                <button type="submit" class="btn-primary w-full text-center font-bold focus:outline-none focus:shadow-outline rounded-md">
                    Odoslať registráciu
                </button>
            </div>

            <!-- Správy o stave odoslania -->
            <div id="statusMessage" class="mt-4 text-center"></div>
        </form>
    </div>

    <!-- JavaScript pre logiku formulára -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('registrationForm');
            const statusMessage = document.getElementById('statusMessage');
            const phonePrefixSelect = document.getElementById('phonePrefix');

            // Predvoľby telefónnych čísel pre SR a ČR
            const phonePrefixes = [
                { code: '+421', name: 'Slovensko (+421)' },
                { code: '+420', name: 'Česká republika (+420)' },
                { code: '+1', name: 'USA/Kanada (+1)' },
                { code: '+44', name: 'Spojené kráľovstvo (+44)' },
                { code: '+49', name: 'Nemecko (+49)' },
                { code: '+33', name: 'Francúzsko (+33)' },
                { code: '+34', name: 'Španielsko (+34)' },
                { code: '+39', name: 'Taliansko (+39)' },
                { code: '+43', name: 'Rakúsko (+43)' },
                { code: '+48', name: 'Poľsko (+48)' },
                { code: '+36', name: 'Maďarsko (+36)' },
                { code: '+385', name: 'Chorvátsko (+385)' },
                { code: '+359', name: 'Bulharsko (+359)' },
                { code: '+40', name: 'Rumunsko (+40)' },
                { code: '+32', name: 'Belgicko (+32)' },
                { code: '+31', name: 'Holandsko (+31)' },
                { code: '+41', name: 'Švajčiarsko (+41)' },
                { code: '+46', name: 'Švédsko (+46)' },
                { code: '+47', name: 'Nórsko (+47)' },
                { code: '+45', name: 'Dánsko (+45)' },
                { code: '+358', name: 'Fínsko (+358)' },
                { code: '+30', name: 'Grécko (+30)' },
                { code: '+351', name: 'Portugalsko (+351)' },
                { code: '+353', name: 'Írsko (+353)' },
                { code: '+370', name: 'Litva (+370)' },
                { code: '+371', name: 'Lotyšsko (+371)' },
                { code: '+372', name: 'Estónsko (+372)' },
                { code: '+352', name: 'Luxembursko (+352)' },
                { code: '+356', name: 'Malta (+356)' },
                { code: '+357', name: 'Cyprus (+357)' },
                { code: '+386', name: 'Slovinsko (+386)' },
            ];

            // Naplnenie select boxu predvoľbami
            phonePrefixes.forEach(prefix => {
                const option = document.createElement('option');
                option.value = prefix.code;
                option.textContent = prefix.name;
                phonePrefixSelect.appendChild(option);
            });

            // Nastavenie predvolenej predvoľby na +421 (Slovensko)
            phonePrefixSelect.value = '+421';

            form.addEventListener('submit', async function(event) {
                event.preventDefault(); // Zabráni predvolenému odoslaniu formulára

                statusMessage.textContent = 'Odosielam...';
                statusMessage.className = 'mt-4 text-center text-gray-600';

                const formData = {};
                const elements = form.elements;

                // Zber dát z formulára
                for (let i = 0; i < elements.length; i++) {
                    const element = elements[i];
                    if (element.name) {
                        const nameParts = element.name.split('.');
                        let current = formData;
                        for (let j = 0; j < nameParts.length - 1; j++) {
                            if (!current[nameParts[j]]) {
                                current[nameParts[j]] = {};
                            }
                            current = current[nameParts[j]];
                        }
                        current[nameParts[nameParts.length - 1]] = element.value;
                    }
                }

                // Špeciálne spracovanie pre telefónne číslo s predvoľbou
                formData.contactPerson.phone = `${formData.contactPerson.phonePrefix}${formData.contactPerson.phone}`;
                delete formData.contactPerson.phonePrefix; // Odstráni samostatnú predvoľbu, ak už je spojená

                try {
                    // Nahraďte túto URL vašou URL adresou nasadenej webovej aplikácie Google Apps Script
                    const scriptUrl = 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec'; // ZMEŇTE TOTO!

                    const response = await fetch(scriptUrl, {
                        method: 'POST',
                        mode: 'cors', // Dôležité pre komunikáciu medzi doménami
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(formData),
                    });

                    const result = await response.json();

                    if (result.success) {
                        statusMessage.textContent = result.message;
                        statusMessage.className = 'mt-4 text-center success-message';
                        form.reset(); // Vymaže formulár po úspešnom odoslaní
                        phonePrefixSelect.value = '+421'; // Reset predvolenej predvoľby
                    } else {
                        statusMessage.textContent = `Chyba: ${result.message}`;
                        statusMessage.className = 'mt-4 text-center error-message';
                    }
                } catch (error) {
                    console.error('Chyba pri odosielaní formulára:', error);
                    statusMessage.textContent = 'Nastala chyba pri odosielaní formulára. Skúste to prosím znova.';
                    statusMessage.className = 'mt-4 text-center error-message';
                }
            });
        });
    </script>
</body>
</html>
