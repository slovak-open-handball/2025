<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Správca turnaja - Skupiny</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="spravca-turnaja-style.css">
    <style>
        /* Nové štýly pre flexbox usporiadanie kategórií */
        #groupsContent {
            display: flex;
            flex-wrap: wrap; /* Umožní zalomenie na nový riadok */
            gap: 20px; /* Medzera medzi kategóriami */
            justify-content: flex-start; /* Zarovnanie kategórií na začiatok */
            align-items: flex-start; /* Zarovnanie položiek na začiatok krížovej osi */
            /* Zabezpečí, že groupsContent zaberie dostupnú šírku */
            width: 100%; 
            max-width: 100%; /* Zabezpečí, že nepretečie */
        }

        .category-group-section {
            /* Upravený flex-basis a flex-shrink na 0, aby sa predišlo prekrývaniu */
            /* Používame calc pre presnejší výpočet šírky s ohľadom na gap */
            flex: 0 0 calc(33.33% - 13.3333px); /* (100% - 2*gap) / 3 = (100% - 40px) / 3 */
            min-width: 500px; /* Zvýšená minimálna šírka pre lepšie zobrazenie obsahu tabuľky a tlačidiel */
            box-sizing: border-box; /* Zabezpečí správne počítanie šírky s paddingom a borderom */
            margin-bottom: 0; /* Odstráni spodný margin, ak je definovaný inde */
            /* overflow-x: auto; */ /* Odstránené, aby sa zabránilo horizontálnemu posuvníku */
        }

        /* Zabezpečí, že tabuľky vnútri sekcií nepretečú */
        .category-group-section table {
            width: 100%;
            /* table-layout: fixed; */ /* Odstránené, aby sa šírka stĺpcov prispôsobila obsahu */
        }

        /* Explicitné nastavenie šírok stĺpcov pre tabuľku skupín */
        /* Tieto šírky sú teraz len orientačné, prehliadač ich bude prispôsobovať obsahu */
        .category-group-table th:nth-child(1),
        .category-group-table td:nth-child(1) {
            /* width: 35%; */ /* Odstránené */
            min-width: 150px; /* Minimálna šírka pre názov skupiny */
        }

        .category-group-table th:nth-child(2),
        .category-group-table td:nth-child(2) {
            /* width: 35%; */ /* Odstránené */
            min-width: 150px; /* Minimálna šírka pre typ skupiny */
        }

        .category-group-table th:nth-child(3),
        .category-group-table td:nth-child(3) {
            /* width: 30%; */ /* Odstránené */
            min-width: 180px; /* Minimálna šírka pre akcie (tlačidlá) */
        }

        .category-group-table th,
        .category-group-table td {
            padding: 8px; /* Pridá padding pre lepšiu čitateľnosť */
            white-space: nowrap; /* Zabráni zalamovaniu textu */
        }
        
        .category-group-table td:nth-child(3) {
            display: flex; /* Použije flexbox pre tlačidlá */
            justify-content: space-between; /* Tlačidlá sa rozložia na okraje stĺpca */
            align-items: center; /* Vertikálne centrovanie tlačidiel */
            gap: 5px; /* Medzera medzi tlačidlami */
            white-space: nowrap; /* Zabezpečí, že tlačidlá sa nezalamujú */
        }

        /* Prispôsobenie pre menšie obrazovky */
        @media (max-width: 900px) {
            .category-group-section {
                flex: 0 0 calc(50% - 10px); /* Dva stĺpce na menších obrazovkách, (100% - 1*gap) / 2 = (100% - 20px) / 2 */
                min-width: 480px; /* Upravená minimálna šírka */
            }
        }

        @media (max-width: 600px) {
            .category-group-section {
                flex: 0 0 100%; /* Jeden stĺpec na mobilných zariadeniach */
                min-width: unset; /* Zruší minimálnu šírku na mobiloch pre plnú šírku */
            }
            /* Na mobiloch môžeme zmeniť rozloženie stĺpcov, ak je to potrebné */
            .category-group-table th:nth-child(1),
            .category-group-table td:nth-child(1),
            .category-group-table th:nth-child(2),
            .category-group-table td:nth-child(2),
            .category-group-table th:nth-child(3),
            .category-group-table td:nth-child(3) {
                width: auto; /* Automatická šírka pre flexibilné prispôsobenie */
            }
            .category-group-table th,
            .category-group-table td {
                display: block; /* Každá bunka na novom riadku */
                text-align: left; /* Zarovnanie textu vľavo */
                white-space: normal; /* Umožní zalomenie textu na mobiloch, ak je to potrebné */
            }
            .category-group-table thead {
                display: none; /* Skryje hlavičku tabuľky na mobiloch */
            }
            .category-group-table tr {
                display: block; /* Každý riadok ako blok */
                margin-bottom: 15px; /* Medzera medzi riadkami */
                border: 1px solid #ddd;
                border-radius: 8px;
                padding: 10px;
            }
            .category-group-table td:before {
                content: attr(data-label); /* Zobrazí label z data-label atribútu */
                font-weight: bold;
                margin-right: 10px;
            }
            .category-group-table td:nth-child(1):before { content: "Názov skupiny:"; }
            .category-group-table td:nth-child(2):before { content: "Typ skupiny:"; }
            .category-group-table td:nth-child(3):before { content: "Akcie:"; }
            .category-group-table .actions-cell {
                display: flex;
                justify-content: center;
                gap: 5px;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <script type="module" src="auth.js"></script>
    <script src="script.js"></script>
    <h1>Správca turnaja</h1>
    <div class="content-wrapper">
        <nav class="left-menu">
            <ul>
                <li><a href="spravca-turnaja-kategorie.html">Vytvorenie kategórií</a></li>
                <li><a href="spravca-turnaja-skupiny.html">Vytvorenie skupín</a></li>
                <li><a href="spravca-turnaja-zoznam-timov.html">Vytvorenie tímov</a></li>
                <li><a href="zobrazenie-skupin.html">Zobrazenie skupín</a></li>
                <li><a href="spravca-turnaja-zapasy.html">Zápasy</a></li>
                <li><a href="spravca-turnaja-nastavenia.html">Nastavenia</a></li>
            </ul>
        </nav>
        <main>
            <h2>Vytvorenie skupín</h2>
            <div id="groupsContent">
            </div>
        </main>
    </div>
    <button id="addButton" class="add-button" title="Pridať skupinu">+</button>

    <div id="groupModal" class="modal">
        <div class="modal-content">
            <span class="close group-modal-close">&times;</span>
            <h2 id="groupModalTitle">Pridať skupinu</h2>
            <form id="groupForm">
                <div>
                     <label for="groupCategory">Kategória:</label>
                     <select id="groupCategory" required>
                     </select>
                </div>
                <div>
                    <label for="groupType">Typ skupiny:</label>
                    <select id="groupType" required>
                        <option value="">-- Vyberte typ skupiny --</option>
                        <option value="Zakladna skupina">Základná skupina</option>
                        <option value="Nadstavbova skupina">Nadstavbová skupina</option>
                        <option value="Skupina o umiestnenie">Skupina o umiestnenie</option>
                    </select>
                </div>
                <div>
                    <label for="groupName">Názov skupiny:</label>
                    <input type="text" id="groupName" required>
                </div>
                <button type="submit">Uložiť</button>
            </form>
        </div>
    </div>

    <div id="messageModal" class="modal">
        <div class="modal-content">
            <span class="close message-modal-close">&times;</span>
            <h2 id="messageModalTitle"></h2>
            <p id="messageModalText"></p>
            <div id="messageModalButtons" class="modal-buttons">
            </div>
        </div>
    </div>

    <script type="module" src="spravca-turnaja-common.js"></script>
    <script type="module" src="spravca-turnaja-skupiny.js"></script>
</body>
</html>
